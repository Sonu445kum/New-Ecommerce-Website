name: Advanced CI/CD Pipeline (MERN + Docker)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend
        working-directory: backend
        run: npm ci

      - name: Install Frontend
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist


  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Test Backend
        working-directory: backend
        run: npm test --if-present

      - name: Test Frontend
        working-directory: frontend
        run: npm test --if-present

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present || true


  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-app:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-app:${{ github.sha }}


  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    defaults:
      run:
        shell: bash

    steps:
      - name: Trigger Deploy
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "🚀 Production Deploy"
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
          else
            echo "🧪 Staging Deploy"
            curl -X POST ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}
          fi

      - name: Wait
        run: sleep 40

      - name: Health Check
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            URL=${{ secrets.PROD_BACKEND_URL }}
          else
            URL=${{ secrets.STAGING_BACKEND_URL }}
          fi

          for i in {1..5}; do
            if curl -f $URL; then
              echo "✅ API OK"
              exit 0
            fi
            sleep 10
          done

          echo "❌ API Failed"
          exit 1
