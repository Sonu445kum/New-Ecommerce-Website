name: CI/CD Pipeline for MERN App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install backend deps
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      # 4. Install frontend deps
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      # 5. Build frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # 6. Success message
      - name: Done
        run: echo "Build successful 🚀"