name: CI/CD Pipeline for MERN App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: true
      matrix:
        node-version: [18]

    steps:
      # 1️ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️ Setup Node.js with caching
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # 3️ Install Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          npm config set prefer-offline true
          npm ci

      # 4️ Install Frontend Dependencies
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          npm config set prefer-offline true
          npm ci

      # 5️ Lint (safe)
      - name: Lint Backend
        working-directory: backend
        run: npm run lint --if-present

      - name: Lint Frontend
        working-directory: frontend
        run: npm run lint --if-present || true

      # 6️ Tests (safe)
      - name: Test Backend
        working-directory: backend
        run: npm test --if-present

      - name: Test Frontend
        working-directory: frontend
        run: npm test --if-present

      # 7️ Build Frontend
      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # 8️ Security Audit (non-blocking)
      - name: Security Audit (Backend)
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Security Audit (Frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      # 9️ Upload Build Artifact
      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # 10 Trigger Render Deployment (ONLY on push)
      - name: Trigger Render Deploy
        if: github.event_name == 'push'
        run: |
          echo "Triggering Render deployment..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      # 1️1️ Wait for deployment
      - name: Wait for deployment
        if: github.event_name == 'push'
        run: |
          echo "Waiting for backend to deploy..."
          sleep 40

      # 1️2️ Health Check API
      - name: Health Check API
        if: github.event_name == 'push'
        run: |
          echo "Checking API health..."
          curl -f ${{ secrets.BACKEND_HEALTH_URL }} || (echo "API failed" && exit 1)

      # 1️3️ Done
      - name: Done
        run: echo "CI/CD Pipeline completed successfully 🚀"